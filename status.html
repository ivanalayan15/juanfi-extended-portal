$(if var == bytes-in)
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Bytes In</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="refresh" content="3; url=$(link-status)?var=bytes-in">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
        }

        body {
            color: #b2b2b2;
            font-size: 12px;
            font-family: Arial, Helvetica, sans-serif;
            line-height: 18px;
            white-space: nowrap;
        }
    </style>
</head>
<body>$(bytes-in-nice)</body>
</html>
$(elif var == bytes-out)
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Bytes Out</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="refresh" content="3; url=$(link-status)?var=bytes-out">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
        }

        body {
            color: #b2b2b2;
            font-size: 12px;
            font-family: Arial, Helvetica, sans-serif;
            line-height: 18px;
            white-space: nowrap;
        }
    </style>
</head>
<body>$(bytes-out-nice)</body>
</html>
$(else)
<!DOCTYPE html>
<html lang="en">

<head>
    <title>Loading</title>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="refresh" content="1; url=$(link-status)">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <link rel="stylesheet" href="assets/css/JuanFi.css?v=$(ip)-$(mac)-bac312">
    <script src="assets/js/core.js?v=$(ip)-$(mac)" defer></script>

    <script>
        var error = "$(error)";
        if (error == "customer $(username) has reached uptime limit") {
            location.replace('/juanfi.html?v=' + Date.now());
        }

        var sessionTimeLeft = "$(session-time-left-secs)"
        var time = parseInt(sessionTimeLeft);
        if (time > 0) {
            window.location.href = "http://clients3.google.com/generate_204";
        }
        setTimeout(function () {
            location.replace('/juanfi.html?v=' + Date.now());
        }, 1000)
    </script>

    $(if chap-id)
    <form name="sendin" action="$(link-login-only)" method="post">
        <input type="hidden" name="username" />
        <input type="hidden" name="password" />
        <input type="hidden" name="dst" value="$(link-orig)" />
        <input type="hidden" name="popup" value="true" />
    </form>

    <script type="text/javascript" src="assets/js/md5.js"></script>
    <script type="text/javascript">
        function doLogin() {
            document.sendin.username.value = document.login.username.value;
            document.sendin.password.value = hexMD5('$(chap-id)' + document.login.password.value + '$(chap-challenge)');
            document.sendin.submit();
            return false;
        }
        doLogin();
    </script>
    $(endif)
</head>
<body>
<div class="d-flex flex-column align-items-center justify-content-center">
    <div id="loaderDiv" class="spinner-border" role="status">
        <span class="sr-only"></span>
    </div>
</div>
<div id="networkStatusContainer"
     class="container px-2 py-1 d-flex justify-content-around gap-2 align-items-center">
    <div class="d-flex justify-content-between gap-2 align-items-center">
        <i class="bi bi-cloud-download juanfi-primary-text"></i>
        <small class="small">$(bytes-in-nice)</small>
    </div>
    <div>
        <small class="blinking2" id="connectionStatus">Loading...</small>
    </div>
    <div class="d-flex justify-content-between gap-2 align-items-center">
        <i class="bi bi-cloud-upload juanfi-primary-text"></i>
        <small class="small">$(bytes-out-nice)</small>
    </div>
</div>
</body>
</html>
$(endif)
