<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JuanFi - Games</title>
    <script>
        var loginError = "";
        var mac = "$(mac)";
        var uIp = "$(ip)";
        var append = "$(ip)-$(mac)-20260414b1";
        var hotspotAddress = "$(server-address)";
        var interfaceName = "$(interface-name)";
        var remainingTimer = null;
        var sessiontimeInSecs = "$(session-time-left-secs)";
        var isLoggedIn = false;
        $(if logged-in)
            isLoggedIn = parseInt(sessiontimeInSecs) > 0;
        $(endif)
    </script>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css?v=$(ip)-$(mac)-20260414b1">
    <link rel="stylesheet" href="assets/css/core.css?v=$(ip)-$(mac)-20260414b1">
    <link rel="stylesheet" href="assets/css/JuanFi.css?v=$(ip)-$(mac)-20260414b1">
    <link rel="stylesheet" href="assets/lib/bootstrap-icons.css?v=$(ip)-$(mac)-20260414b1">
    <link rel="stylesheet" href="assets/css/games.css?v=$(ip)-$(mac)-20260414b1">
    <script src="assets/js/eload.js?v=$(ip)-$(mac)-20260414b1" defer></script>
</head>

<body class="portal-body col-xxl-4 col-xl-4 col-lg-6 col-md-8 col-sm-9 col-12 mx-auto pt-3 px-2">
    <div class="d-flex flex-column align-items-center justify-content-center">
        <div id="loaderDiv" class="spinner-border" role="status">
            <span class="sr-only"></span>
        </div>
    </div>

    <div id="containerDiv" class="portal-shell d-flex flex-column gap-2 hide">
        <div id="headerContainer" class="d-flex justify-content-between align-items-center container p-0">
            <button id="gamesBackBtn" class="btn btn-dark btn-sm m-0" onclick="goBackToPortal()">
                <i class="bi bi-arrow-left"></i> BACK
            </button>
            <div class="header-points-container d-flex align-items-center gap-1 m-0">
                <img src="assets/img/coin.png" width="14" height="14" class="points-icon" />
                <span id="headerPointsDisplay" class="fw-bold" style="font-size:0.82rem;color:#ffbf73;">--</span>
            </div>
        </div>

        <div class="container text-center">
            <h6 class="fw-bold mb-2" style="color:#eef4ff;letter-spacing:0.06em;">GAMES</h6>

            <div class="d-flex flex-column gap-2">
                <div class="game-card d-flex align-items-center gap-3 p-3">
                    <img src="assets/img/duck.png" alt="Duck Race"
                        style="width: 48px; height: 48px; filter: drop-shadow(0 0 4px rgba(255,191,115,0.5));"
                        onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'48\' height=\'48\'><text x=\'50%\' y=\'50%\' font-size=\'30\' text-anchor=\'middle\' dominant-baseline=\'middle\'>🦆</text></svg>'">
                    <div class="text-start flex-grow-1">
                        <div class="fw-bold" style="font-size:0.88rem;color:#ffbf73;">Duck Race</div>
                        <div style="font-size:0.7rem;color:#8ea4cd;">Bet on your lucky duck and win points!</div>
                    </div>
                    <button class="btn btn-warning btn-sm fw-bold" data-bs-toggle="modal"
                        data-bs-target="#duckRaceModal" style="white-space:nowrap;">
                        PLAY
                    </button>
                </div>

                <div id="spinWheelCard" class="game-card d-flex align-items-center gap-3 p-3">
                    <img src="assets/img/coin.png" alt="Spin the Wheel"
                        style="width: 48px; height: 48px; filter: drop-shadow(0 0 4px rgba(255,191,115,0.5));"
                        onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'48\' height=\'48\'><text x=\'50%\' y=\'50%\' font-size=\'30\' text-anchor=\'middle\' dominant-baseline=\'middle\'>🎡</text></svg>'">
                    <div class="text-start flex-grow-1">
                        <div class="fw-bold" style="font-size:0.88rem;color:#ffbf73;">Spin the Wheel</div>
                        <div style="font-size:0.7rem;color:#8ea4cd;">Redeem points for exciting rewards!</div>
                    </div>
                    <button class="btn btn-warning btn-sm fw-bold" id="spinRedeemBtn" style="white-space:nowrap;">
                        PLAY
                    </button>
                </div>
            </div>
        </div>

        <!-- Duck Race Modal -->
        <div class="modal fade" id="duckRaceModal" tabindex="-1" aria-labelledby="duckRaceModalLabel" aria-hidden="true"
            data-bs-backdrop="static">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header pb-2 align-items-center">
                        <h5 class="modal-title fw-bold mb-0" style="color:#ffbf73;" id="duckRaceModalLabel">Duck Race</h5>
                        <div class="ms-auto me-3 d-flex align-items-center" style="font-size:0.78rem;color:#9fb3d8;">
                            <i class="bi bi-coin me-1" style="color:#ffbf73;"></i>
                            <span id="userPointsDisplay" class="fw-bold me-1">--</span> pts
                        </div>
                        <button type="button" class="btn-close btn-close-white ms-0" data-bs-dismiss="modal"
                            aria-label="Close"></button>
                    </div>
                    <div class="modal-body pt-2 pb-3 px-3">
                        <div class="text-center mb-2" style="font-size:0.72rem;color:#36cfa2;font-weight:700;">1 point per race</div>
                        <div class="d-flex justify-content-center gap-2 flex-wrap mb-3" id="duckSelection">
                            <button class="btn btn-outline-info duck-bet-btn btn-sm" data-duck="1">Duck 1</button>
                            <button class="btn btn-outline-info duck-bet-btn btn-sm" data-duck="2">Duck 2</button>
                            <button class="btn btn-outline-info duck-bet-btn btn-sm" data-duck="3">Duck 3</button>
                            <button class="btn btn-outline-info duck-bet-btn btn-sm" data-duck="4">Duck 4</button>
                            <button class="btn btn-outline-info duck-bet-btn btn-sm" data-duck="5">Duck 5</button>
                        </div>
                        <button class="btn btn-warning w-100 fw-bold mb-3" id="duckRaceStartBtn" disabled>
                            START RACE
                        </button>

                        <div id="raceResult" class="alert mt-3 d-none fw-bold text-center shadow" role="alert"
                            style="font-size: 0.78rem;">
                            <!-- Result message will appear here -->
                        </div>
                        <button class="btn btn-success w-100 fw-bold my-2 d-none" id="raceAgainBtn">
                            RACE AGAIN
                        </button>
                        <!-- Race Track UI -->
                        <div class="race-track rounded shadow overflow-hidden position-relative" style="height: 60dvh;">
                            <div class="water-background"></div>
                            <div class="finish-line">FINISH</div>

                            <div class="lanes-container d-flex justify-content-between h-100 position-relative p-2">
                                <div class="lane" id="lane-1">
                                    <div class="duck" id="duck-1">🦆<span class="duck-label">1</span></div>
                                </div>
                                <div class="lane" id="lane-2">
                                    <div class="duck" id="duck-2">🦆<span class="duck-label">2</span></div>
                                </div>
                                <div class="lane" id="lane-3">
                                    <div class="duck" id="duck-3">🦆<span class="duck-label">3</span></div>
                                </div>
                                <div class="lane" id="lane-4">
                                    <div class="duck" id="duck-4">🦆<span class="duck-label">4</span></div>
                                </div>
                                <div class="lane" id="lane-5">
                                    <div class="duck" id="duck-5">🦆<span class="duck-label">5</span></div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>

        <!-- Spin to Redeem Modal -->
        <div class="modal fade" id="redeemBySpinModal" tabindex="-1" role="dialog"
            aria-labelledby="redeemBySpinModalLabel" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
            <div class="modal-dialog modal-dialog-centered" role="document">
                <div class="modal-content">
                    <div class="modal-header pb-2">
                        <h5 class="modal-title fw-bold" style="color:#ffbf73;" id="redeemBySpinModalLabel">Spin to Redeem</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="container-fluid">
                            <div class="row mb-2">
                                <div class="col-12 text-center">
                                    <div class="small" style="color:#9fb3d8;font-size:0.72rem;">Reward Point Balance</div>
                                    <div class="d-flex align-items-center justify-content-center gap-1">
                                        <img src="assets/img/coin.png" width="18px" height="18px" />
                                        <span class="availablePointsDisplay fw-bold" style="font-size:1.4rem;color:#ffbf73;">0.00</span>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-12 text-center">
                                    <small style="color:#7b93bf;font-size:0.7rem;">Redemption rule: <span class="redeemRatio"
                                            id="redeemRatio2">1</span> point
                                        = 1 spin</small>
                                </div>
                            </div>
                            <div class="spinner-wrapper my-3 text-center d-flex justify-content-center">
                                <canvas id="wheelCanvas" aria-label="Prize wheel" style="width: auto; height: 45dvh;"></canvas>
                            </div>
                            <div id="redeemedValueWrapper" class="row mb-3 d-none">
                                <div class="col-12 text-center">
                                    <div id="selectedReward" class="alert alert-success fw-bold"></div>
                                </div>
                            </div>
                            <div class="d-flex flex-column gap-2">
                                <button type="button" id="spinBtn" class="btn btn-warning fw-bold">SPIN</button>
                                <button id="spinCancelBtn" type="button" class="btn btn-dark" data-bs-dismiss="modal"
                                    aria-label="Close">CLOSE
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/jquery.min.js?v=$(ip)-$(mac)-20260414b1"></script>
    <script src="assets/js/bootstrap.bundle.min.js?v=$(ip)-$(mac)-20260414b1"></script>
    <script>
        function getUrlParameter(name) {
            name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
            var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            var results = regex.exec(location.search);
            return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
        }
        var mac = getUrlParameter('mac');
        var vendorIpAddress = getUrlParameter('ip');
        var interfaceName = "";
        var isLoggedIn = true;
    </script>
    <script src="assets/js/core.js?v=$(ip)-$(mac)-20260414b1"></script>
    <script src="assets/js/games.js?v=$(ip)-$(mac)-20260414b1"></script>
</body>

</html>
